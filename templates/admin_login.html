<!DOCTYPE html>
<html>
<head><title>Admin Login</title></head>
<body>
  <h2>管理员登录</h2>
  {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/login">
    <label>管理员密钥: <input type="password" name="key" required></label>
    <button type="submit">登录</button>
  </form>
</body>
</html>
